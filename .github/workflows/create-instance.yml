name: Create OCI Instance
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  create-instance:
    runs-on: ubuntu-latest
    steps:
      - name: Install OCI CLI
        run: pip install oci-cli

      - name: Configure OCI
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_KEY_CONTENT }}" > ~/.oci/key.pem
          chmod 600 ~/.oci/key.pem
          cat > ~/.oci/config << EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY }}
          region=${{ secrets.OCI_REGION }}
          key_file=~/.oci/key.pem
          EOF
          chmod 600 ~/.oci/config

      - name: Try to create instance
        env:
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
          SUPPRESS_LABEL_WARNING: "True"
        run: |
          IMAGE_ID=$(oci compute image list \
            --compartment-id "${{ secrets.OCI_TENANCY }}" \
            --operating-system "Canonical Ubuntu" \
            --operating-system-version "22.04" \
            --shape "VM.Standard.A1.Flex" \
            --sort-by TIMECREATED \
            --sort-order DESC \
            --limit 1 \
            --query 'data[0]."id"' \
            --raw-output 2>/dev/null)

          echo "Image ID: $IMAGE_ID"

          printf '%s' "${{ secrets.SSH_PUBLIC_KEY }}" > /tmp/ssh_key.pub
          printf '{"ocpus":4.0,"memoryInGBs":24.0}' > /tmp/shape.json

          oci compute instance launch \
            --availability-domain "AD-1" \
            --compartment-id "${{ secrets.OCI_TENANCY }}" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config file:///tmp/shape.json \
            --subnet-id "${{ secrets.OCI_SUBNET_ID }}" \
            --image-id "$IMAGE_ID" \
            --assign-public-ip true \
            --boot-volume-size-in-gbs 100 \
            --display-name "nextcloud" \
            --ssh-authorized-keys-file /tmp/ssh_key.pub
