name: Create OCI Instance
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  create-instance:
    runs-on: ubuntu-latest
    steps:
      - name: Install OCI CLI
        run: pip install oci-cli

      - name: Configure OCI
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_KEY_CONTENT }}" > ~/.oci/key.pem
          chmod 600 ~/.oci/key.pem
          cat > ~/.oci/config << EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY }}
          region=${{ secrets.OCI_REGION }}
          key_file=~/.oci/key.pem
          EOF
          chmod 600 ~/.oci/config

      - name: Try to create instance
        env:
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
        run: |
          IMAGE_ID=$(oci compute image list \
            --compartment-id "${{ secrets.OCI_TENANCY }}" \
            --operating-system "Canonical Ubuntu" \
            --operating-system-version "22.04" \
            --shape "VM.Standard.A1.Flex" \
            --sort-by TIMECREATED \
            --sort-order DESC \
            --limit 1 \
            --query 'data[0]."id"' \
            --raw-output 2>/dev/null)

          echo "Image ID: $IMAGE_ID"
          printf '%s' "${{ secrets.SSH_PUBLIC_KEY }}" > /tmp/ssh_key.pub

          python3 - << PYEOF
          import oci, os

          config = oci.config.from_file("~/.oci/config")
          compute = oci.core.ComputeClient(config)

          with open("/tmp/ssh_key.pub") as f:
              ssh_key = f.read().strip()

          details = oci.core.models.LaunchInstanceDetails(
              availability_domain="AD-1",
              compartment_id="${{ secrets.OCI_TENANCY }}",
              shape="VM.Standard.A1.Flex",
              shape_config=oci.core.models.LaunchInstanceShapeConfigDetails(
                  ocpus=4.0,
                  memory_in_gbs=24.0
              ),
              source_details=oci.core.models.InstanceSourceViaImageDetails(
                  image_id=os.environ.get("IMAGE_ID", "$IMAGE_ID"),
                  source_type="image",
                  boot_volume_size_in_gbs=100
              ),
              create_vnic_details=oci.core.models.CreateVnicDetails(
                  subnet_id="${{ secrets.OCI_SUBNET_ID }}",
                  assign_public_ip=True
              ),
              metadata={"ssh_authorized_keys": ssh_key},
              display_name="nextcloud"
          )

          response = compute.launch_instance(details)
          print("Instance created:", response.data.id)
          PYEOF
